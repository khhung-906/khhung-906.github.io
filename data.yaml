paper_list:
  - title: "TQL: Scaling Q-Functions with Transformers by Preventing Attention Collapse"
    image: "assets/images/tql.png"
    image_size: 1.0
    tags: [selected, rl]
    authors: "<a href='https://pd-perry.github.io/'>Perry Dong</a>*, <strong>Kuo-Han Hung*</strong>, <a href='https://aswerdlow.com/'>Alexander Swerdlow</a>, <a href='https://dorsa.fyi/'>Dorsa Sadigh</a>, and <a href='https://ai.stanford.edu/~cbfinn/'>Chelsea Finn</a>"
    conference: "Under Review"
    venue: "Under Review"
    paper_link: "https://arxiv.org/abs/2602.01439"
    code_link: "https://github.com/pd-perry/TQL"
    page_link: "https://pd-perry.github.io/transformer-q-learning/"
    abstract: "Transformer Q-functions suffer from attention collapse. TQL prevents this via proper scaling and architecture choices, enabling effective Q-learning in both offline and online RL."
  - title: "DexMan: Learning Bimanual Dexterous Manipulation from Human and Generated Videos"
    image: "assets/images/dexman.png"
    image_size: 1.0
    tags: [selected, rl, robotics]
    authors: "Jhen Hsieh, Kuan-Hsun Tu, <strong>Kuo-Han Hung</strong>, and <a href='https://twke18.github.io/'>Tsung-Wei Ke</a>"
    conference: "Under Review"
    venue: "Under Review"
    paper_link: "https://arxiv.org/abs/2510.08475"
    code_link: "https://github.com/EmbodiedAI-NTU/DexMan"
    page_link: "https://embodiedai-ntu.github.io/dexman/index.html"
    abstract: "DexMan converts human videos into bimanual dexterous manipulation for humanoid robots without calibration or ground-truth actions, using contact-based rewards to achieve state-of-the-art results."
  - title: "Learning Skill Abstraction from Action-Free Videos via Optical Flow"
    image: "assets/images/sof.png"
    image_size: 1.05
    tags: [robotics]
    authors: "<a href='https://hc-fang.github.io/'>Hung-Chieh Fang</a>*, <strong>Kuo-Han Hung*</strong>, Chu-Rong Chen, Po-Jung Chou, Chun-Kai Yang, Po-Chen Ko, <a href='https://vllab.ee.ntu.edu.tw/ycwang.html'>Yu-Chiang Wang</a>, <a href='https://kristery.github.io/'>Yueh-Hua Wu</a>, <a href='https://minhungchen.netlify.app/'>Min-Hung Chen</a>, and <a href='https://shaohua0116.github.io/'>Shao-Hua Sun</a>"
    conference: "ICML Workshop on Building Physically Plausible World Models, 2025"
    venue: "ICML 2025"
    paper_link: "https://arxiv.org/abs/2512.20052"
    code_link: ""
    page_link: ""
    abstract: "SOF learns latent skills from action-free videos via optical flow, bridging video models and low-level actions for improved multitask and long-horizon performance."
  - title: "Attention Tracker: Detecting Prompt Injection Attacks in LLMs"
    image: "assets/images/attention.png"
    image_size: 0.95
    tags: [selected]
    authors: "<strong>Kuo-Han Hung</strong>, <a href='https://ireneko.github.io/'>Ching-Yun Ko</a>, Ambrish Rawat, I-Hsin Chung, <a href='https://winstonhsu.info/'>Winston Hsu</a>, <a href='https://sites.google.com/site/pinyuchenpage/'>Pin-Yu Chen</a>"
    conference: "Annual Conference of the Nations of the Americas Chapter of the Association for Computational Linguistics (NAACL) 2025"
    venue: "NAACL 2025"
    paper_link: "https://arxiv.org/abs/2411.00348"
    code_link: "https://github.com/khhung-906/Attention-Tracker"
    page_link: "https://huggingface.co/spaces/TrustSafeAI/Attention-Tracker"
    abstract: "Attention Tracker is a training-free method that monitors attention patterns to detect prompt injection attacks on LLM agents without additional inference."
  - title: "VICtoR: Learning Hierarchical Vision-Instruction Correlation Rewards for Long-horizon Manipulation"
    image: "assets/images/victor.png"
    image_size: 1.0
    tags: [selected, rl, robotics]
    authors: "<strong>Kuo-Han Hung*</strong>, Pang-Chi Lo*, <a href='https://jiafongyeh.github.io/'>Jia-Fong Yeh</a>*, Han-Yuan Hsu, <a href='https://sites.google.com/site/yitingchen0524/home'>Yi-Ting Chen</a>, <a href='https://winstonhsu.info/'>Winston Hsu</a>"
    conference: "International Conference on Learning Representations (ICLR) 2025"
    venue: "ICLR 2025"
    paper_link: "https://arxiv.org/abs/2405.16545"
    code_link: ""
    page_link: "https://cmlab-victor.github.io/cmlab-vicotor.github.io/"
    abstract: "VICtoR is a hierarchical reward model using LLMs for task decomposition and VLMs for progress assessment, improving long-horizon manipulation success by 43%."
  - title: "AED: Adaptable Error Detection for Few-shot Imitation Policy"
    image: "assets/images/aed.png"
    image_size: 1.0
    tags: [robotics]
    authors: "<a href='https://jiafongyeh.github.io/'>Jia-Fong Yeh</a>, <strong>Kuo-Han Hung*</strong>, Pang-Chi Lo*, Chi-Ming Chung, <a href='https://tsunghan-wu.github.io/'>Tsung-Han Wu</a>, Hung-Ting Su, <a href='https://sites.google.com/site/yitingchen0524/home'>Yi-Ting Chen</a>, <a href='https://winstonhsu.info/'>Winston Hsu</a>"
    conference: "Conference on Neural Information Processing System (NeurIPS) 2024"
    venue: "NeurIPS 2024"
    paper_link: "https://arxiv.org/abs/2402.03860"
    code_link: ""
    page_link: "https://aed-neurips.github.io/#"
    abstract: "We formulate the adaptable error detection problem for monitoring few-shot imitation policies and propose PrObe, which learns directly from the policy's feature representations."
